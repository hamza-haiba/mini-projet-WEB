<main style="padding: 50px 10%; background: #fdfdfd;">
    <section class="contact-container" style="max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2 style="text-align: center; color: #111; margin-bottom: 20px;"><i class="fas fa-paper-plane" style="color: #ff4d4d;"></i> Contactez-nous</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Une question ? Notre équipe à Marrakech vous répondra dans les plus brefs délais.</p>
        
        <form id="contactForm">
            <div style="margin-bottom: 15px;">
                <label>Nom Complet :</label>
                <input type="text" id="nom" placeholder="Votre nom" style="width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Email :</label>
                <input type="email" id="email" placeholder="exemple@mail.com" style="width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Message :</label>
                <textarea id="message" rows="4" placeholder="Comment pouvons-nous vous aider ?" style="width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
            </div>
            <button type="button" onclick="validerFormulaire()" class="btn-main" style="width: 100%; border: none; cursor: pointer;">Envoyer le Message</button>
        </form>
        <div id="statusMsg" style="margin-top: 20px; text-align: center; font-weight: bold;"></div>
    </section>
</main>
