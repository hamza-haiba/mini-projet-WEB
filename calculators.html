<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur IMC - GymFit</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        </header>

    <main style="padding: 60px 10%; display: flex; justify-content: center;">
    <section class="imc-card">
        <div class="imc-header">
            <i class="fas fa-calculator"></i>
            <h2>Calculateur IMC</h2>
        </div>
        <p>Entrez vos mesures pour obtenir votre Indice de Masse Corporelle.</p>
        
        <div class="input-group">
            <div class="field">
                <label>Poids (kg)</label>
                <input type="number" id="poids" placeholder="ex: 75">
            </div>
            <div class="field">
                <label>Taille (cm)</label>
                <input type="number" id="taille" placeholder="ex: 180">
            </div>
        </div>
        
        <button onclick="calculerIMC()" class="btn-calc">Calculer mon IMC</button>
        
        <div id="affichage-resultat" class="result-box"></div>
    </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
